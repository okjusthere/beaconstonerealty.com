<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1">
    <link rel="stylesheet" type="text/css" href="/css/style.css"/>
    <link rel="stylesheet" type="text/css" href="/css/style-register.css"/>
    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="/js/crypto-js.js"></script>
    <script type="text/javascript" src="/js/webforce.js"></script>
</head>
<body>
<!-- 动态背景元素 -->
<div class="scan-line"></div>

<div class="floating-shape shape-1"></div>
<div class="floating-shape shape-2"></div>
<div class="floating-shape shape-3"></div>

<div class="pulse-ring ring-1"></div>
<div class="pulse-ring ring-2"></div>

<div class="register-wrapper">
    <div class="brand-section">
        <div class="logo">
            <div class="logo-icon">
                <!-- 购物袋SVG图标 -->
                <svg viewBox="0 0 24 24">
                    <path d="M19,7H16V6A4,4 0 0,0 12,2A4,4 0 0,0 8,6V7H5A2,2 0 0,0 3,9V20A2,2 0 0,0 5,22H19A2,2 0 0,0 21,20V9A2,2 0 0,0 19,7M8,6A2,2 0 0,1 12,4A2,2 0 0,1 14,6V7H10V6M14,12H12V14H10V12H8V10H10V8H12V10H14V12Z"/>
                </svg>
            </div>
            <div class="logo-text">优品商城</div>
            <div class="slogan">开启您的购物之旅</div>
        </div>
    </div>

    <div class="register-container">
        <div class="register-header">
            <h2>创建账户</h2>
            <p>欢迎注册优品商城</p>
        </div>

        <div class="register-form">
            <div class="form-group">
                <label for="phone">手机号</label>
                <input type="tel" id="phone" class="form-control" placeholder="请输入手机号">
            </div>

            <div class="form-group">
                <label for="sms-code">验证码</label>
                <div class="code-container">
                    <input type="text" id="sms-code" class="form-control" placeholder="请输入验证码">
                    <button class="send-code-btn" id="send-code-btn">发送验证码</button>
                </div>
            </div>

            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" class="form-control" placeholder="请输入用户名（2-16位字符）">
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" class="form-control" placeholder="请输入密码（至少8位）">
                <div class="password-strength">
                    <div class="strength-bar">
                        <div class="strength-fill" id="strength-fill"></div>
                    </div>
                    <span id="strength-text">密码强度</span>
                </div>
            </div>

            <div class="form-group">
                <label for="confirm-password">确认密码</label>
                <input type="password" id="confirm-password" class="form-control" placeholder="请再次输入密码">
                <div class="password-match" id="password-match"></div>
            </div>

            <div class="register-options">
                <div class="agree-terms">
                    <input type="checkbox" id="agree">
                    <label for="agree">我已阅读并同意</label>
                </div>
                <a href="#" style="color: #008aff;">《用户协议》</a>
            </div>

            <button class="register-btn" id="register-btn">
                <span>立即注册</span>
            </button>

            <div class="register-footer">
                <span>已有账号？</span>
                <a href="/login"><i class="fas fa-sign-in-alt"></i> 立即登录</a>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript" src="/js/webforce_register.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1">
    <link rel="stylesheet" type="text/css" href="/css/font-awesome.css" />
    <link rel="stylesheet" type="text/css" href="/css/animate.min.css" />
    <link rel="stylesheet" type="text/css" href="/css/style.css" />
    <link rel="stylesheet" type="text/css" href="/css/page.css" />
    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="/js/wow.js"></script>
    <script type="text/javascript" src="/js/webforce.js"></script>
    <script type="text/javascript" src="/js/webforce_message.js"></script>
    <script type="text/javascript" src="/js/webforce_search.js"></script>
    <script type="text/javascript" src="/js/myjs.js"></script>
</head>
<body>
<!-- header start -->
<div class="header"></div>
<!-- header end -->

<div class="inbannerbg"></div>
<script type="text/javascript">
    $(".inbannerbg").html(banner_inner(5));
</script>

<div class="inbarbg">
	<div class="wapper1">
        <div class="inbar">
            <div class="weizhi"></div>
            <div class="inner_menu"></div>
        </div>
    </div>
</div>
<script type="text/javascript">
	$(".weizhi").html(navigation());
	$(".inner_menu").html(menu_inner());
</script>

<!-- content start -->
<div class="m11_insidebg">
	<div class="wapper1">
    	<div class="m11_inside">
        	
            <div class="search_form">
                <form id="infosearch" onkeydown="kdSubmit('infosearch')">
                    <select id="search_type" hidden>
                        <option value="1" selected>产品</option>
                        <option value="2">文章</option>
                    </select>
                    <input id="search_keywords" type="text" placeholder="请填写关键词">
                    <input id="search" type="button" value="搜索">
                </form>
            </div>
            <div class="search_content">
            </div>
            
        </div>
    </div>
</div>
<!-- content end -->

<!-- foot start -->
<div class="footer"></div>
<!-- foot end -->
</body>
</html>

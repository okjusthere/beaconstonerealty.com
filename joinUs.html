<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1">
    <link rel="stylesheet" type="text/css" href="/css/font-awesome.css" />
    <link rel="stylesheet" type="text/css" href="/css/animate.min.css" />
    <link rel="stylesheet" type="text/css" href="/css/swiper.min.css">
    <link rel="stylesheet" type="text/css" href="/css/common.css" />
    <link rel="stylesheet" type="text/css" href="/css/appcommon.css" />
    <link rel="stylesheet" type="text/css" href="/css/style.css" />
    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="/js/swiper.min.js"></script>
    <script type="text/javascript" src="/js/swiper.animate.min.js"></script>
    <script type="text/javascript" src="/js/wow.js"></script>
    <script type="text/javascript" src="/js/webforce.js"></script>
    <script type="text/javascript" src="/js/webforce_search.js"></script>
    <script type="text/javascript" src="/js/webforce_message.js"></script>
    <script type="text/javascript" src="/js/joinUs.js"></script>
    <script type="text/javascript" src="/js/myjs.js"></script>
</head>

<body>
    <!-- header start -->
    <div class="header"></div>
    <!-- header end -->

    <main role="main" class="Staticpage">
        <div class="grid u-bg-white">
            <div class="grid__item">
                <section class="Static-hero">
                    <div class="u-bg-navy Static-hero__info Static-hero__info--with-media">
                        <div class="container">
                            <h1 class="u-color-white Static-hero__heading"> </h1>
                            <p class="h4 u-font-mercury-italic u-color-white Static-hero__description"> </p>
                        </div>
                    </div>
                    <div class="container Static-hero__media-container">
                        <div>
                            <div class="Media" style="padding-top:56.25%;"> <span
                                    class="Media__video-play-icon u-focus"><i id="video-play"
                                        class="Media__icon icon icon-videoplay u-color-white"></i></span>
                                <div id="undefined-static-hero-video-player"
                                    class="Media__video brightcove-video-player">
                                    <video src=""></video>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
                <div class="u-bg-white joinUs02bg">
                    <div class="container u-no-padding">
                        <div class="grid__item   palm--1-1">
                            <div class="con01">
                                <div class="left">
                                    <h1 class="h2-desk u-padding-bottom-20 u-color-dark-blue">
                                    </h1>
                                    <div class="content01"></div>
                                </div>
                                <div class="right">

                                </div>
                            </div>
                            <div style="text-align: center;">
                                <a href=" " rel="0"
                                    class="btn btn--with-arrow btn btn--secondary u-text-uppercase u-text-center btn--white u-margin-bottom-30 btn--transparent">
                                    Join Us <i class="fa fa-long-arrow-right"></i></a>
                            </div>

                        </div>
                    </div>
                </div>

                <section class="StaticStackableImage u-bg-white joinUs03bg">
                    <div class="StaticStackableImage__container container grid">

                        <div class="grid__item push--desk--2-12 desk--5-12 push--lap--1-8 lap--5-8 palm--1-1">
                            <div class="StaticStackableImage__bottom-image-container lazy-img"><img
                                    class="StaticStackableImage__image" src="" ></div>
                        </div>
                        <div
                            class="StaticStackableImage__bottom-text-container grid__item push--desk--3-12 desk--4-12 push--lap--1-8 lap--6-8 palm--1-1">
                            <h3 class="StaticStackableImage__bottom-title u-color-dark-blue"> </h3>
                            <div class="content"></div>
                            <div class="StaticStackableImage__cta"><a href=" " target="_blank"
                                    class="btn btn--with-arrow btn--no-padding btn--primary u-text-uppercase btn--white"><span
                                        class="btn__container"><span class="btn__text">Explore the client
                                            experience</span> <i
                                            class="fa fa-long-arrow-right"
                                            style="color:#3E3634;"></i></span> </a></div>
                        </div>
                    </div>
                </section>

                <section class="StaticCarousel joinUs04bg" eyebrow="Unlock your potential" id="agent-videos">
                    <section  role="region" aria-label="media carousel"
                        class="MediaCarousel MediaCarousel--guide">
                        <div  class="MediaCarousel__title--bottom">
                            <h2  class="h2 u-color-dark-blue MediaCarousel__title--bottom-guide"> 
                            </h2>
                        </div>
                        <div 
                            class="MediaCarousel__container grid u-bg-blueSir MediaCarousel__container--guide">
                            <div  class="MediaCarousel__carousel">
                                <div id="certify">
                                    <div class="swiper-container swiper-container-horizontal">
                                        <div class="swiper-wrapper" >
                                            
                                        </div>
                                    </div> 
                                    <div class="swiper-button-prev"></div>
                                    <div class="swiper-button-next"></div>
                                </div>
                               
                            </div>
                        </div>
                    </section>
                </section>

                <section class="StaticHeading u-padding-section-80 u-bg-navy false" >
                    <div class="container grid u-text-center" style="margin: 0 auto;" >
                        <div class="StaticHeading__top grid__item desk--8-12 lap--6-8 u-text-center" >

                            <h2 class="StaticHeading__heading u-heading-section u-color-white" >
                                Discover More</h2>
                        </div>
                    </div>
                </section>
                <section class="StaticGrid u-no-padding u-bg-navy joinUs05bg" >
                    <ul class="StaticGrid__list container grid" style="margin: 0 auto;" >
                        
                        
                    </ul>
                </section>
                
            </div>
        </div>
    </main>

    <!-- foot start -->
    <div class="footer"></div>
    <!-- foot end -->
</body>

</html>

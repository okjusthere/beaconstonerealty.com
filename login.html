<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1">
    <link rel="stylesheet" type="text/css" href="/css/style.css"/>
    <link rel="stylesheet" type="text/css" href="/css/style-login.css"/>
    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="/js/crypto-js.js"></script>
    <script type="text/javascript" src="/js/webforce.js"></script>
</head>
<body>
<!-- 动态背景元素 -->
<div class="scan-line"></div>

<div class="floating-shape shape-1"></div>
<div class="floating-shape shape-2"></div>
<div class="floating-shape shape-3"></div>

<div class="pulse-ring ring-1"></div>
<div class="pulse-ring ring-2"></div>

<div class="login-wrapper">
    <div class="brand-section">
        <div class="logo">
            <div class="logo-icon">
                <!-- 购物袋SVG图标 -->
                <svg viewBox="0 0 24 24">
                    <path d="M19,7H16V6A4,4 0 0,0 12,2A4,4 0 0,0 8,6V7H5A2,2 0 0,0 3,9V20A2,2 0 0,0 5,22H19A2,2 0 0,0 21,20V9A2,2 0 0,0 19,7M8,6A2,2 0 0,1 12,4A2,2 0 0,1 14,6V7H10V6M14,12H12V14H10V12H8V10H10V8H12V10H14V12Z"/>
                </svg>
            </div>
            <div class="logo-text">优品商城</div>
            <div class="slogan">品质生活 优选于此</div>
        </div>
    </div>

    <div class="login-container">
        <div class="login-header">
            <h2>账户登录</h2>
            <p>欢迎来到我们的商城</p>
        </div>

        <div class="login-tabs">
            <div class="tab active" data-tab="account">账号登录</div>
            <div class="tab" data-tab="phone">手机号登录</div>
        </div>

        <div class="login-form">
            <!-- 账号登录表单 -->
            <div class="form-panel active" id="account-form">
                <div class="form-group">
                    <label for="username">账号</label>
                    <input id="username" class="form-control" type="text" placeholder="请输入用户名">
                </div>

                <div class="form-group">
                    <label for="password">密码</label>
                    <input id="password" class="form-control" type="password" placeholder="请输入密码">
                </div>

                <div class="form-group">
                    <label for="captcha">验证码</label>
                    <div class="captcha-container">
                        <input id="code" type="text" class="form-control" placeholder="点击图片更换验证码"
                               value="">
                        <img id="code_img" class="captcha-img" src="" onclick="changeCode()"/>
                    </div>
                </div>

                <div class="login-options">
                    <div class="remember-me">
                        <input type="checkbox" id="remember">
                        <label for="remember">记住我</label>
                    </div>
                    <a href="/findpwd" style="color: #008aff;">
                        忘记密码?
                    </a>
                </div>
                <button class="login-btn" id="login_username">立即登录</button>
            </div>

            <!-- 手机号登录表单 -->
            <div class="form-panel" id="phone-form">
                <div class="form-group">
                    <label for="phone">手机号</label>
                    <input id="mobile" class="form-control" type="text" placeholder="请输入手机号">
                </div>

                <div class="form-group">
                    <label for="sms-code">验证码</label>
                    <div class="captcha-container">
                        <input id="mobile_code" class="form-control" type="text" placeholder="请输入验证码">
                        <button class="send-code-btn" id="send_code">发送验证码</button>
                    </div>
                </div>
                <button class="login-btn" id="login_mobile">立即登录</button>
            </div>

            <div class="login-footer">
                <a href="/register">
                    <svg class="icon" viewBox="0 0 24 24">
                        <path d="M15,14C12.33,14 7,15.33 7,18V20H23V18C23,15.33 17.67,14 15,14M6,10V7H4V10H1V12H4V15H6V12H9V10M15,12A4,4 0 0,0 19,8A4,4 0 0,0 15,4A4,4 0 0,0 11,8A4,4 0 0,0 15,12Z"/>
                    </svg>
                    注册账号
                </a>
                <a href="#">
                    <svg class="icon" viewBox="0 0 24 24">
                        <path d="M12,1L3,5V11C3,16.55 6.84,21.74 12,23C17.16,21.74 21,16.55 21,11V5L12,1M12,7C13.4,7 14.8,8.6 14.8,10V11.5C15.4,11.5 16,12.1 16,12.7V16.5C16,17.1 15.4,17.7 14.8,17.7H9.2C8.6,17.7 8,17.1 8,16.5V12.6C8,12 8.6,11.4 9.2,11.4V10C9.2,8.6 10.6,7 12,7M12,8.2C11.2,8.2 10.5,8.7 10.5,9.5V11.5H13.5V9.5C13.5,8.7 12.8,8.2 12,8.2Z"/>
                    </svg>
                    隐私政策
                </a>
            </div>
        </div>
    </div>
</div>

<!--登录相关js-->
<script type="text/javascript" src="/js/webforce_login.js"></script>
</body>
</html>

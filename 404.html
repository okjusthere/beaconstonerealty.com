<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico"/>
    <title>404页面不存在</title>
    <meta name="description" content="404页面不存在">
    <meta name="keywords" content="404页面不存在">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1">
    <link rel="stylesheet" type="text/css" href="/css/font-awesome.css" />
    <link rel="stylesheet" type="text/css" href="/css/style.css" />
    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="/js/webforce.js?1"></script>
    <script type="text/javascript" src="/js/webforce_search.js?2"></script>
</head>
<body>
<!-- header start -->
<div class="header"></div>
<script type="text/javascript">
    $(".header").html(header());
</script>
<!-- header end -->

<div id="con" style="height: 300px;padding-top:100px;">
    <div style="margin: 0; text-indent: 2em; font-size: 16px; line-height: 40px; color: #333; text-align:center;">
        您当前访问的页面不存在！<span id=jump>3</span> 秒后返回首页。或<a href="" id="home">直接返回</a>
    </div>
    <script type="text/javascript">
        function countDown(secs) {
            var url = "http://" + window.location.host;
            $("#home").attr("href", url);
            $("#jump").text(secs);
            if (--secs > 0) {
                setTimeout("countDown(" + secs + ")", 1000);
            } else {
                window.location.href = url;
            }
        }

        countDown($("#jump").text());
    </script>
</div>

<!-- foot start -->
<div class="footer">
</div>
<script type="text/javascript">
    $(".footer").html(footer());
</script>
<!-- foot end -->
</body>
</html>

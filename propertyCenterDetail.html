<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1">
    <link rel="stylesheet" type="text/css" href="/css/font-awesome.css" />
    <link rel="stylesheet" type="text/css" href="/css/animate.min.css" />
    <link rel="stylesheet" type="text/css" href="/css/swiper.min.css">
    <link rel="stylesheet" type="text/css" href="/css/common.css" />
    <link rel="stylesheet" type="text/css" href="/css/appcommon.css" />
    <link rel="stylesheet" type="text/css" href="/css/propertyCenterDetail.css" />
    <link rel="stylesheet" type="text/css" href="/css/propertyCenterDetail2.css" />
    <link rel="stylesheet" type="text/css" href="/css/propertyCenterDetail3.css" />
    <link rel="stylesheet" type="text/css" href="/css/propertyCenterDetail4.css" />
    <link rel="stylesheet" type="text/css" href="/css/propertyCenterDetail5.css" />
    <link rel="stylesheet" type="text/css" href="/css/propertyCenterDetail6.css" />
    <link rel="stylesheet" type="text/css" href="/css/propertyCenterDetail7.css" />
    <link rel="stylesheet" type="text/css" href="/css/propertyCenterDetail8.css" />
    <link rel="stylesheet" type="text/css" href="/css/propertyCenterDetail9.css" />
    <!-- <link rel="stylesheet" type="text/css" href="/css/propertyCenterDetail10.css" /> -->
    <link rel="stylesheet" type="text/css" href="/css/style.css" />
    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="/js/swiper.min.js"></script>
    <script type="text/javascript" src="/js/swiper.animate.min.js"></script>
    <script type="text/javascript" src="/js/wow.js"></script>
    <script type="text/javascript" src="/js/webforce.js"></script>
    <script type="text/javascript" src="/js/webforce_search.js"></script>
    <script type="text/javascript" src="/js/webforce_message.js"></script>
    <script type="text/javascript" src="/js/propertyCenterDetail.js"></script>
    <script type="text/javascript" src="/js/myjs.js"></script>
</head>

<body>
    <!-- header start -->
    <div class="header"></div>
    <!-- header end -->
    <div role="main">
        <div class="content"></div>
        <section id="communitymedia" class="m-ldp-hero m-ldp-hero__static-wrapper ">
            <div class="m-ldp-hero__static">
                <div class="c-nddp-hero-carousel propertyCenterDetail01bg"> 
                    <div class="c-nddp-hero-carousel__wrapper" id="c-nddp-hero-carousel__wrapper">
                        <div class="c-ldp-hero-carousel__status-flags"></div>
                        <div class="swiper-container">
                            <div class="swiper-wrapper">

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <div class="listing-property-details listing-property-details--community propertyCenterDetail02bg">
            <div class="container">
                <h2 class="title"></h2>
                <div class="des01">
                </div>
                <div class="listing-details-hero listing-details-hero--nddp " id="overview">
                    <div class="grid">
                        <div class="grid-item">
                            <div
                                class="container listing-small-info-agents-container listing-small-info-agents-container--nddp">

                                <div class="listing-small-agents listing-small-agents--nddp">
                                    <div class="m-contact-agents-widget">
                                        <button class="m-contact-agents-widget__agent-cta">
                                            <div class="m-contact-agents-widget__photo">
                                                <div class="responsive-image-container lazy-img">
                                                    <img src=""
                                                        width="212" height="212" class="m-contact-agents-widget__img"
                                                        loading="lazy" style="color:transparent">
                                                </div>
                                            </div>
                                            <div class="m-contact-agents-widget__info"><span
                                                    class="m-contact-agents-widget__info-name"> </span>
                                                <div class="m-contact-agents-widget__info-text"><span>Send
                                                        message</span><i class="fa fa-long-arrow-right"></i></div>
                                            </div>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="development-listing-features">
            <div class="container">
                <div class="grid">
                    <div class="grid__item default--1-1 listing-features--container">
                        <section data-hydration-on-demand="true">
                            <div class="m-property-details-listing-info m-property-details-listing-info--large m-listing-info--sirhuge property-listing-features--nd"
                                id="property-details">
                                <h2 class="m-listing-info__title">Development Details</h2>
                                <div class="m-property-details-listing-info__accordion">
                                    <div class="accordion-group">
                                        <div class="property-details-accordion-item active">
                                            <div tabindex="0" class="property-details-accordion-title"
                                                aria-label="Contract Amenities &amp; services accordion" role="button"
                                                aria-expanded="true" _mstaria-label="1359046">
                                                <h3>Amenities &amp; services</h3><span><i
                                                        class=" fa fa-minus"></i></span>
                                            </div>
                                            <div class="property-details-accordion-content"
                                                style="opacity: 1; height: auto;">
                                                <div
                                                    class="m-property-details-listing-info__columns development_details">

                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>
                    </div>
                </div>
            </div>
        </div>
        <div class="listing-contact-info js-listing-agent-contact" style="position:relative" id="agentcontact-anchor">
            <div class="container">
                <div class="m-listing-contact-info">
                    <div class="m-listing-contact-info__agent ">
                        <div class="m-listing-contact-info__agent-photo">
                            <div class="responsive-image-container lazy-img"><img  src=""
                                    width="250" height="333" decoding="async" data-nimg="1" class="" loading="lazy"
                                    style="color:transparent" _mstalt="287222"></div>
                        </div>
                        <div class="m-listing-contact-info__agent-details">
                            <h2 class="m-listing-contact-info__agent-name"><a
                                    href=""
                                    target="_self"></a></h2>
                            <div class="m-listing-contact-info__agent-designation">Real Estate Professional</div>
                            <ul class="m-listing-contact-info__agent-phones" role="list">
                                <li class="m-listing-contact-info__agent-phone" role="listitem"><a
                                        href=" "><span> </span></a></li>
                            </ul>
                            <div class="m-listing-contact-info__agent-email"></div><a
                                class="m-listing-contact-info__agent-link"
                                href=""
                                target="_self"><span>Agent Profile</span><i class="fa fa-long-arrow-right"></i></a>
                            <div class="m-listing-contact-info__agent-office">
                                <div class="m-listing-contact-info__office">
                                    <div class="divider"></div>
                                    <div class="m-listing-contact-info__office-label">office</div>
                                    <div class="m-listing-contact-info__office-name"><a
                                            href="javascript:;"
                                            target="_self">
                                            <font _mstmutation="1"> </font>
                                        </a></div>
                                    <div class="m-listing-contact-info__office-address">
                                       
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="m-listing-contact-info__contact" id="listingContactInfoWrapper">
                        <div id="listingContactInfoForm" class="m-listing-contact-info__contact-anchor" role="form"
                            tabindex="-1" aria-label="Contact Agent Form" _mstaria-label="307333"></div>
                        <h3 class="m-listing-contact-info__contact-title">Let's get in touch</h3>
                        <div class="m-listing-contact-info__contact-form">
                            <form id="GetInTouchForm">
                                <div class="grid">
                                    <div
                                        class="grid__item default--1-2 palm-wide--1-1 palm--1-1 lap-wide--1-1 lap--1-1 u-padding-right input-holder">
                                        <div class="input-container  "><label for="firstname"
                                                class="label-inactive">First Name</label><input class="o-input       "
                                                type="text" name="contacts" id="firstname" placeholder="First Name"
                                                aria-label="First Name" required="" value="" _mstplaceholder="130260"
                                                _mstaria-label="130260"></div>
                                    </div>
                                    <div
                                        class="grid__item default--1-2 palm-wide--1-1 palm--1-1 lap-wide--1-1 lap--1-1 input-holder">
                                        <div class="input-container  "><label for="lastname" class="label-inactive">Last
                                                Name</label><input class="o-input       " type="text" name="lastname"
                                                id="lastname" placeholder="Last Name" aria-label="Last Name" required=""
                                                value="" _mstplaceholder="108628" _mstaria-label="108628"></div>
                                    </div>
                                    <div
                                        class="grid__item default--1-2 palm-wide--1-1 palm--1-1 lap-wide--1-1 lap--1-1 u-padding-right input-holder">
                                        <div class="input-container  "><label for="email" class="label-inactive">Email
                                                Address</label><input class="o-input       " type="email" name="email"
                                                id="email" placeholder="Email Address" aria-label="Email Address"
                                                required="" value="" _mstplaceholder="198861" _mstaria-label="198861">
                                        </div>
                                    </div>
                                    <div
                                        class="grid__item default--1-2 palm-wide--1-1 palm--1-1 lap-wide--1-1 lap--1-1 input-holder">
                                        <div class="input-container  "><label for="phone" class="label-inactive">Phone
                                                number (Optional)</label><input class="o-input       " type="text"
                                                name="phone" id="phone" placeholder="Phone number (Optional)"
                                                aria-label="Phone number (Optional)" pattern="[0-9]+" value=""
                                                _mstplaceholder="451529" _mstaria-label="451529"></div>
                                    </div>
                                    <div class="grid__item default--1-1">
                                        <div class="input-container  input-container--textarea  "><label
                                                for="message">Message (Optional)</label><textarea class="o-textarea  "
                                                id="message" name="message" aria-label="Message (Optional)"
                                                placeholder="I'm interested in the Olana Naples Residence"
                                                _mstplaceholder="1287689" _mstaria-label="314756"></textarea></div>
                                    </div>
                                    <div class="grid__item">
                                        <div class="captcha__message">
                                            
                                        </div>
                                    </div><div class="button-submit" type="submit" id="submit"><span>Send message</span><i
                                            class="fa fa-long-arrow-right"></i></div>
                                    <div class="disclaimer"> 
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- content end -->

    <!-- foot start -->
    <div class="footer"></div>
    <!-- foot end -->
</body>

</html>

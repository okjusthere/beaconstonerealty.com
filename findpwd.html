<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="/css/style.css"/>
    <link rel="stylesheet" type="text/css" href="/css/style-findpwd.css"/>
    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="/js/crypto-js.js"></script>
    <script type="text/javascript" src="/js/webforce.js"></script>
</head>
<body>
<!-- 动态背景元素 -->
<div class="scan-line"></div>

<div class="floating-shape shape-1"></div>
<div class="floating-shape shape-2"></div>
<div class="floating-shape shape-3"></div>

<div class="pulse-ring ring-1"></div>
<div class="pulse-ring ring-2"></div>

<div class="forgot-wrapper">
    <div class="brand-section">
        <div class="logo">
            <div class="logo-icon">
                <!-- 锁图标 -->
                <svg viewBox="0 0 24 24">
                    <path d="M12,17A2,2 0 0,0 14,15C14,13.89 13.1,13 12,13A2,2 0 0,0 10,15A2,2 0 0,0 12,17M18,8A2,2 0 0,1 20,10V20A2,2 0 0,1 18,22H6A2,2 0 0,1 4,20V10C4,8.89 4.9,8 6,8H7V6A5,5 0 0,1 12,1A5,5 0 0,1 17,6V8H18M12,3A3,3 0 0,0 9,6V8H15V6A3,3 0 0,0 12,3Z"/>
                </svg>
            </div>
            <div class="logo-text">优品商城</div>
            <div class="slogan">找回您的账户</div>
        </div>
    </div>

    <div class="forgot-container">
        <div class="forgot-header">
            <h2>忘记密码</h2>
            <p>请按照以下步骤重置您的密码，确保账户安全</p>
        </div>

        <!-- 步骤指示器 -->
        <div class="steps">
            <div class="step active">
                <div class="step-number">1</div>
                <div class="step-text">验证身份</div>
            </div>
            <div class="step">
                <div class="step-number">2</div>
                <div class="step-text">设置新密码</div>
            </div>
            <div class="step">
                <div class="step-number">3</div>
                <div class="step-text">完成</div>
            </div>
        </div>

        <div class="forgot-form">
            <!-- 步骤1：验证身份 -->
            <div class="step-panel active" id="step1">
                <div class="form-group">
                    <label for="phone">手机号</label>
                    <input type="tel" id="phone" class="form-control" placeholder="请输入注册时使用的手机号">
                </div>

                <div class="form-group">
                    <label for="sms-code">验证码</label>
                    <div class="code-container">
                        <input type="text" id="sms-code" class="form-control" placeholder="请输入验证码">
                        <button class="send-code-btn" id="send-code-btn">发送验证码</button>
                    </div>
                </div>

                <button class="forgot-btn" id="next-step1-btn">下一步</button>
            </div>

            <!-- 步骤2：设置新密码 -->
            <div class="step-panel" id="step2">
                <div class="form-group">
                    <label for="new-password">新密码</label>
                    <input type="password" id="new-password" class="form-control" placeholder="请输入新密码（至少8位）">
                    <div class="password-strength">
                        <div class="strength-bar">
                            <div class="strength-fill" id="strength-fill"></div>
                        </div>
                        <span id="strength-text">密码强度</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm-new-password">确认新密码</label>
                    <input type="password" id="confirm-new-password" class="form-control"
                           placeholder="请再次输入新密码">
                    <div class="password-match" id="password-match"></div>
                </div>

                <div class="form-group">
                    <div style="display: flex; gap: 15px;">
                        <button class="forgot-btn" style="background: #f5f5f5; color: #666;" id="prev-step2-btn">
                            上一步
                        </button>
                        <button class="forgot-btn" id="next-step2-btn">下一步</button>
                    </div>
                </div>
            </div>

            <!-- 步骤3：完成 -->
            <div class="step-panel" id="step3">
                <div style="text-align: center; padding: 20px 0;">
                    <div style="width: 80px; height: 80px; background: #e8f5e9; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
                        <svg style="width: 40px; height: 40px; fill: #4caf50;" viewBox="0 0 24 24">
                            <path d="M9,20.42L2.79,14.21L5.62,11.38L9,14.77L18.88,4.88L21.71,7.71L9,20.42Z"/>
                        </svg>
                    </div>
                    <h3 style="color: #333; margin-bottom: 10px;">密码重置成功！</h3>
                    <p style="color: #666; margin-bottom: 20px;">您的密码已成功重置，请使用新密码登录</p>
                </div>

                <button class="forgot-btn" id="go-to-login-btn">前往登录</button>
            </div>

            <div class="forgot-footer">
                <a href="/login">返回登录</a>
                <a href="/register">注册账号</a>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript" src="/js/webforce_findpwd.js"></script>
</body>
</html>

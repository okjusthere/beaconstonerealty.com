<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1">
    <link rel="stylesheet" type="text/css" href="/css/font-awesome.css"/>
    <link rel="stylesheet" type="text/css" href="/css/animate.min.css"/>
    <link rel="stylesheet" type="text/css" href="/css/style.css"/>
    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="/js/wow.js"></script>
    <script type="text/javascript" src="/js/webforce.js?1"></script>
    <script type="text/javascript" src="/js/webforce_search.js?2"></script>
    <script type="text/javascript" src="/js/webforce_message.js"></script>
    <script type="text/javascript" src="/js/myjs.js"></script>
</head>
<body>
<!-- header start -->
<div class="header"></div>
<!-- header end -->

<div class="inbannerbg"></div>
<script type="text/javascript">
    $(".inbannerbg").html(banner_inner(5));
</script>

<div class="inbarbg">
    <div class="wapper1">
        <div class="inbar">
            <div class="weizhi"></div>
            <div class="inner_menu"></div>
        </div>
    </div>
</div>
<script type="text/javascript">
    $(".weizhi").html(navigation());
    $(".inner_menu").html(menu_inner());
</script>

<!-- content start -->
<div class="m11_insidebg">
    <div class="wapper1">
        <div class="m11_inside">
            <div class="m11_message1">
                <div class="m11_tit2">
                    <div class="h2"><strong></strong><span></span></div>
                </div>
                <div class="list1"><img src=""></div>
                <div class="list2">
                    <div class="message1">
                        <form>
                            <ul>
                                <li>
                                    <div class="h3">主题<font>*</font></div>
                                    <input class="input_text" type="text" name="title" placeholder="请填写咨询主题"
                                           value=""></li>
                                <li>
                                    <div class="h3">姓名<font>*</font></div>
                                    <input class="input_text" type="text" name="contacts" placeholder="请填写联系人"
                                           value=""></li>
                                <li>
                                    <div class="h3">电话<font>*</font></div>
                                    <input class="input_text" type="text" name="phone" placeholder="请填写手机号码"
                                           value=""></li>
                                <li>
                                    <div class="h3">邮箱<font>*</font></div>
                                    <input class="input_text" type="text" name="email" placeholder="请填写电子邮箱"
                                           value=""></li>
                                <li class="li1">
                                    <div class="h3">留言<font>*</font></div>
                                    <textarea rows="5" name="message" placeholder="请填写咨询内容"></textarea></li>
                                <li>
                                    <div class="h3">验证码<font>*</font></div>
                                    <div class='yzm'>
                                        <input class='input_text1' type='text' name='code'
                                               placeholder='短信验证码' value=''>
                                        <img id="code_img" src="" onclick="changeCode()" style="cursor:pointer;">
                                    </div>
                                </li>
                                <li class="li1" style="text-align:center;">
                                    <input class="input_button" type="button" id="submit" value="提交信息">
                                </li>
                            </ul>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script type="text/javascript">
    $(".m11_message1 .m11_tit2 .h2 strong").html(menu(9, "title"));
    $(".m11_message1 .m11_tit2 .h2 span").html(menu(9, "remarks"));
    $(".m11_message1 .list1 img").attr("src", menu(9, "thumbnail"));
</script>
<!-- content end -->

<!-- foot start -->
<div class="footer"></div>
<!-- foot end -->
</body>
</html>
